name: Test basic usage (files input)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdownlint on valid markdown file
        id: action
        uses: .
        with:
          files: >-
            ${{ github.workspace }}/actions/hardened/nosborn--github-action-markdown-cli/v3.3.0/tests/fixtures/valid.md
      - name: Assert action succeeded
        run: |
          echo "Action completed successfully"
          echo "PASS"
