name: Test basic valid markdown
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create valid markdown file
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-md"
          cat > "$GITHUB_WORKSPACE/test-md/valid.md" << 'EOF'
          # Hello World

          This is a valid markdown file.

          ## Section Two

          Some content here.

          - Item one
          - Item two
          - Item three
          EOF

      - name: Run markdownlint on valid file
        id: action
        uses: .
        with:
          files: test-md/valid.md

      - name: Assert action succeeded
        run: |
          echo "PASS: markdownlint ran successfully on valid markdown"
