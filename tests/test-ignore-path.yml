name: Test ignore_path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdownlint with ignore_path pointing to ignore list file
        id: action
        uses: .
        with:
          files: tests/fixtures
          ignore_path: tests/fixtures/ignorelist.txt
      - name: Assert action succeeded
        run: |
          echo "PASS: markdownlint ran successfully with ignore_path set"
