name: Test ignore_path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create valid and invalid markdown files plus ignore path file
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-ignorepath"
          # Valid file
          cat > "$GITHUB_WORKSPACE/test-ignorepath/good.md" << 'EOF'
          # Good File

          This file is valid markdown.

          ## Section

          Content here.
          EOF
          # Invalid file (missing blank line after heading)
          printf '# Bad\nNo blank line after heading\n## Sub\nContent\n' \
            > "$GITHUB_WORKSPACE/test-ignorepath/bad.md"
          # Ignore file listing the bad file
          echo "test-ignorepath/bad.md" > "$GITHUB_WORKSPACE/test-ignorepath/.ignorefile"

      - name: Run markdownlint with ignore_path pointing to ignore file (should pass)
        id: action
        uses: .
        with:
          files: test-ignorepath
          ignore_path: test-ignorepath/.ignorefile

      - name: Assert action succeeded when bad file is excluded via ignore_path
        run: |
          echo "PASS: markdownlint passed because bad file was excluded via ignore_path"
