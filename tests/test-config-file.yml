name: Test config_file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdownlint with config file
        id: action
        uses: .
        with:
          files: >-
            ${{ github.workspace }}/actions/hardened/nosborn--github-action-markdown-cli/v3.3.0/tests/fixtures/valid.md
          config_file: >-
            ${{ github.workspace }}/actions/hardened/nosborn--github-action-markdown-cli/v3.3.0/tests/fixtures/config/.markdownlint.json
      - name: Assert action succeeded with config
        run: |
          echo "Action completed successfully with config_file"
          echo "PASS"
