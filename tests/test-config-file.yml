name: Test config_file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdownlint with custom config file
        id: action
        uses: .
        with:
          config_file: tests/fixtures/config.json
          files: tests/fixtures/valid.md
      - name: Assert action succeeded
        run: |
          echo "PASS: markdownlint ran successfully with custom config file"
