name: Test rules input (custom rule files)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdownlint with custom rules
        id: action
        uses: .
        with:
          files: >-
            ${{ github.workspace }}/actions/hardened/nosborn--github-action-markdown-cli/v3.3.0/tests/fixtures/valid.md
          rules: >-
            ${{ github.workspace }}/actions/hardened/nosborn--github-action-markdown-cli/v3.3.0/tests/fixtures/custom-rule.js
      - name: Assert action succeeded with custom rules
        run: |
          echo "Action completed successfully with custom rules"
          echo "PASS"
