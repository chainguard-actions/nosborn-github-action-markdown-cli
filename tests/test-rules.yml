name: Test rules input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdownlint with custom rules file
        id: action
        uses: .
        with:
          files: tests/fixtures/valid.md
          rules: tests/fixtures/custom-rule.js
      - name: Assert action succeeded
        run: |
          echo "PASS: markdownlint ran successfully with custom rules"
