name: Test invalid markdown fails lint
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create invalid markdown file (missing blank lines, bad heading style)
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-md-bad"
          printf '# Heading\nNo blank line after heading\n## Sub\nContent\n' \
            > "$GITHUB_WORKSPACE/test-md-bad/invalid.md"

      - name: Run markdownlint on invalid file (expect failure)
        id: action
        uses: .
        with:
          files: test-md-bad/invalid.md
        continue-on-error: true

      - name: Assert action failed as expected
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected markdownlint to fail on invalid markdown, but got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: markdownlint correctly failed on invalid markdown"
