name: Test dot input (include hidden files/folders)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdownlint with dot enabled to include hidden directories
        id: action
        uses: .
        with:
          files: >-
            ${{ github.workspace }}/actions/hardened/nosborn--github-action-markdown-cli/v3.3.0/tests/fixtures/.hidden
          dot: "true"
      - name: Assert action succeeded with dot input
        run: |
          echo "Action completed successfully with dot=true"
          echo "PASS"
